<div>
    <button class="border p-2 cursor-pointer border-[#f2ede4] bg-white rounded-md" (click)="openDialog()">Add new contract +</button>
</div>
@if (isOpen()) {
    <div class="fixed inset-0 bg-black/40 backdrop-blur-xs w-screen h-screen flex items-center justify-center z-50">
        <div class="flex flex-col bg-[#faf7f1] p-8 border border-[#f6e8c8] rounded-md">
            <div class="flex justify-between w-full items-center">
                <div>Add contract</div>
                <button class="border border-[#f6e8c8] rounded-md cursor-pointer p-2" (click)="closeDialog()">x</button>
            </div>
            <form [formGroup]="contractForm" class="flex flex-col gap-4 min-w-lg">
                <label class="flex flex-col gap-1">
                    Name
                    <input formControlName="name" class="border bg-white rounded-md border-[#f6e8c8] p-2" type="text" />
                    @if (nameCtrl.touched && nameCtrl.errors?.['required']) {
                        <span class="text-red-500 text-sm">Name is required</span>
                    }
                    @if (nameCtrl.touched && nameCtrl.errors?.['maxlength']) {
                        <span class="text-red-500 text-sm">Name must be 100 characters or less</span>
                    }
                </label>
                <label class="flex flex-col gap-1">
                    Tags
                    <multi-select
                        formControlName="tags"
                        [items]="tagOptionList()"
                        (createItem)="onTagCreate($event)"
                    >Select tags</multi-select>
                </label>
                <label class="flex flex-col gap-1">
                    Upload contract:
                    <input (change)="onFileChange($event)" class="border bg-white rounded-md border-[#f6e8c8] p-2 cursor-pointer" type="file" accept=".txt,.md" />
                    @if (fileError()) {
                        <span class="text-red-500 text-sm">{{ fileError() }}</span>
                    }
                </label>
                <button
                    (click)="onSubmit($event)"
                    [disabled]="!isFormValid()"
                    class="border rounded-md p-2 cursor-pointer"
                    [class]="isFormValid() ? 'bg-white border-[#f6e8c8]' : 'bg-gray-100 border-gray-200 text-gray-400 cursor-not-allowed'"
                >Submit</button>
            </form>
        </div>
    </div>
}
